{% set name = "dandischema" %}
{% set version = "0.12.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 481ed1da9481090d8000b3b2373a0d4876043f48d4cddc3364c18e0a97bd0c22

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - versioningit
  run:
    - python >={{ python_min }}
    - email-validator >=1.0.3
    - jsonschema
    - packaging >=14.0
    - pydantic >=2.4,<3
    - pydantic-settings
    - requests
    - rfc3987
    - zarr-checksum

test:
  requires:
    - anys
    - pytest
    - pytest-cov
    - pytest-rerunfailures
    - python {{ python_min }}
  source_files:
    - tox.ini
  imports:
    - dandischema
  commands:
    - python -m pytest -vv --pyargs dandischema

about:
  home: https://github.com/dandi/dandischema
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Schemata for DANDI archive project
  description: |
    A Python library for maintaining and managing DANDI metadata schemata. The
    library helps create and validate DANDI schema-compliant metadata for
    Dandisets and assets.
  dev_url: https://github.com/dandi/dandischema

extra:
  recipe-maintainers:
    - yarikoptic
